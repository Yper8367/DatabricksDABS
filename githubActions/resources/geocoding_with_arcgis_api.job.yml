resources:
  jobs:
    geocoding_with_arcgis_api:
      name: Geocoding_with_ArcGIS_API
      tasks:
        - task_key: geocode
          email_notifications: {}
          notebook_task:
            notebook_path: ../src/arcgis_api.ipynb
            source: WORKSPACE
          run_if: ALL_SUCCESS
          timeout_seconds: 0
      email_notifications:
        no_alert_for_skipped_runs: false
      max_concurrent_runs: 1
      performance_target: PERFORMANCE_OPTIMIZED
      queue:
        enabled: true
      timeout_seconds: 0
      webhook_notifications: {}

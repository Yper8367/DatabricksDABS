# This is a Databricks asset bundle definition for githubActions.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: githubActions
  uuid: 8170be3b-e40e-472a-92b7-e476d2ece59c

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-ab15121f-9c5f.cloud.databricks.com
    variables:
      catalog: gridx_dev
      schema: ${workspace.current_user.short_name}
    permissions:
      - user_name: yashodhan.s.talekar@v4c.ai
        level: CAN_MANAGE
    presets:
      artifacts_dynamic_version: true

  prod:
    mode: production
    workspace:
      host: https://dbc-ab15121f-9c5f.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/yashodhan.s.talekar@v4c.ai to make sure we only have a single copy.
      root_path: /Workspace/Users/yashodhan.s.talekar@v4c.ai/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: gridx_dev
      schema: prod
    permissions:
      - user_name: yashodhan.s.talekar@v4c.ai
        level: CAN_MANAGE
